<!doctype html>
<html>
  <head>
    <title>CMD Labs Assets</title>
    <meta name="robots" content="noindex">
    <style>
      body {
        font-family: system-ui, sans-serif;
        background: #0f172a;
        color: white;
        min-height: 100vh;
        display: grid;
        place-items: center;
        margin: 0;
      }
      .card {
        padding: 40px;
        border-radius: 24px;
        background: rgba(255,255,255,0.08);
        border: 1px solid rgba(255,255,255,0.16);
        text-align: center;
      }
      img {
        max-width: 260px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <img src="/logo.svg" alt="CMD Labs logo">
      <p>CMD Labs public assets</p>
    </div>
  </body>
</html>
